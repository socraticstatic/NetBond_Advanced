name: Auto Sync and Deploy

on:
  push:
    branches: [ main ]
  schedule:
    # Run every hour to check for any manual changes
    - cron: '0 * * * *'
  workflow_dispatch:
    inputs:
      force_deploy:
        description: 'Force deployment even if no changes'
        required: false
        default: 'false'

permissions:
  contents: read
  pages: write
  id-token: write
  actions: write

concurrency:
  group: "auto-sync"
  cancel-in-progress: true

jobs:
  sync-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Run type check
        run: npm run type-check
        continue-on-error: true
        
      - name: Build for production
        run: npm run build
        env:
          NODE_ENV: production
          GITHUB_REPOSITORY: socraticstatic/Cloud_Designer
        
      - name: Verify build output
        run: |
          echo "✅ Build completed successfully"
          echo "📁 Build size: $(du -sh dist/ | cut -f1)"
          echo "📄 Files generated: $(find dist/ -type f | wc -l)"
          ls -la dist/
          
      - name: Setup Pages
        uses: actions/configure-pages@v4
        
      - name: Upload to GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'
          
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
        
      - name: Update deployment status
        uses: actions/github-script@v7
        with:
          script: |
            const deploymentUrl = 'https://socraticstatic.github.io/Cloud_Designer/';
            
            console.log(`🚀 Cloud Designer successfully deployed to: ${deploymentUrl}`);
            console.log(`📈 Performance monitoring: https://github.com/socraticstatic/Cloud_Designer/actions`);
            console.log(`🔗 Repository: https://github.com/socraticstatic/Cloud_Designer`);
            
            // Create deployment status
            try {
              await github.rest.repos.createDeploymentStatus({
                owner: 'socraticstatic',
                repo: 'Cloud_Designer',
                deployment_id: context.payload.deployment?.id || 0,
                state: 'success',
                target_url: deploymentUrl,
                description: 'Successfully deployed Cloud Designer to GitHub Pages',
                environment_url: deploymentUrl
              });
            } catch (error) {
              console.log('Note: Could not create deployment status (this is normal for new repositories)');
            }