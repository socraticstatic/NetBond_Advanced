name: Repository Sync

on:
  push:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      sync_force:
        description: 'Force sync even if no changes detected'
        required: false
        default: 'false'

jobs:
  sync-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Get latest changes from bolt.new
        run: |
          # Pull any changes from bolt.new
          git config --global user.name 'GitHub Actions'
          git config --global user.email 'actions@github.com'
          git pull origin main --rebase
          
      - name: Check for changes and sync status
        id: sync-check
        uses: actions/github-script@v7
        with:
          script: |
            // Get the latest commit
            const { data: commits } = await github.rest.repos.listCommits({
              owner: 'socraticstatic',
              repo: 'Cloud_Designer',
              per_page: 1
            });
            
            const latestCommit = commits[0];
            const commitAge = Date.now() - new Date(latestCommit.commit.author.date).getTime();
            const minutesOld = Math.floor(commitAge / (1000 * 60));
            
            console.log(`📋 Repository Sync Status Report`);
            console.log(`📊 Repository: socraticstatic/Cloud_Designer`);
            console.log(`🔍 Commit: ${latestCommit.sha.substring(0, 7)}`);
            console.log(`📝 Message: ${latestCommit.commit.message.split('\n')[0]}`);
            console.log(`👤 Author: ${latestCommit.commit.author.name}`);
            console.log(`⏰ Age: ${minutesOld} minutes ago`);
            console.log(`🔗 Live site: https://socraticstatic.github.io/Cloud_Designer/`);
            
            // Check if GitHub Pages is enabled
            let pagesStatus = '❓ Not checked';
            try {
              const { data: pages } = await github.rest.repos.getPages({
                owner: 'socraticstatic',
                repo: 'Cloud_Designer'
              });
              pagesStatus = '✅ Active';
              console.log(`🌐 Pages URL: ${pages.html_url}`);
              console.log(`📝 Source: ${pages.source.branch}/${pages.source.path}`);
            } catch (error) {
              pagesStatus = '⚠️ Not configured';
              console.log('ℹ️ GitHub Pages may not be enabled or configured');
            }
            
            // Check if we need to trigger a deployment
            let needsDeployment = false;
            let reason = '';
            
            if (context.payload.inputs?.sync_force === 'true') {
              needsDeployment = true;
              reason = 'Forced sync requested';
            } else if (minutesOld < 10) {  // Changed from 1 hour to 10 minutes
              // Check if there's a recent deployment
              const { data: deployments } = await github.rest.repos.listDeployments({
                owner: 'socraticstatic',
                repo: 'Cloud_Designer',
                environment: 'github-pages',
                per_page: 1
              });
              
              if (deployments.length === 0) {
                needsDeployment = true;
                reason = 'No existing deployment found';
              } else {
                const deployment = deployments[0];
                const deploymentTime = new Date(deployment.created_at).getTime();
                const commitTime = new Date(latestCommit.commit.author.date).getTime();
                
                if (deploymentTime < commitTime) {
                  needsDeployment = true;
                  reason = 'New commit detected after last deployment';
                }
              }
            }
            
            // Set outputs for the next steps
            core.setOutput('needs_deployment', needsDeployment);
            core.setOutput('deployment_reason', reason);
            
            // Log the decision
            if (needsDeployment) {
              console.log(`🚀 Deployment needed: ${reason}`);
            } else {
              console.log('✅ Deployment is up to date');
            }
            
            // Return the status for the job summary
            return {
              pages_status: pagesStatus,
              last_commit: latestCommit.sha.substring(0, 7),
              commit_message: latestCommit.commit.message.split('\n')[0],
              commit_age: `${minutesOld} minutes ago`,
              needs_deployment: needsDeployment,
              deployment_reason: reason
            };
            
      - name: Trigger deployment if needed
        if: steps.sync-check.outputs.needs_deployment == 'true'
        run: |
          echo "🚀 Triggering deployment..."
          gh workflow run deploy.yml --ref main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Update status check
        uses: actions/github-script@v7
        with:
          script: |
            const { data: commit } = await github.rest.repos.getCommit({
              owner: 'socraticstatic',
              repo: 'Cloud_Designer',
              ref: context.sha
            });
            
            const status = {
              state: 'success',
              context: 'bolt.new Sync',
              description: 'Synced with bolt.new',
              target_url: 'https://github.com/socraticstatic/Cloud_Designer/actions'
            };
            
            await github.rest.repos.createCommitStatus({
              owner: 'socraticstatic',
              repo: 'Cloud_Designer',
              sha: context.sha,
              ...status
            });