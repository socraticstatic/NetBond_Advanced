name: Preview Build

on:
  pull_request:
    branches: [ main ]
    types: [opened, synchronize, reopened]

jobs:
  preview:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Build for preview
        run: npm run build
        env:
          NODE_ENV: production
          
      - name: Upload preview artifact
        uses: actions/upload-artifact@v4
        with:
          name: preview-build-${{ github.event.number }}
          path: dist/
          retention-days: 7
          
      - name: Comment PR with preview info
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            
            // Calculate build size
            const buildStats = await new Promise((resolve, reject) => {
              require('child_process').exec('du -sh dist/', (error, stdout) => {
                if (error) reject(error);
                else resolve(stdout.trim().split('\t')[0]);
              });
            });
            
            const comment = `## 🔍 Cloud Designer Preview Build Ready
            
            Your pull request has been successfully built and is ready for review.
            
            ### Build Information
            - **Build Status**: ✅ Success
            - **Build Size**: ${buildStats}
            - **Node Version**: 20
            - **Build Time**: ${new Date().toLocaleString()}
            - **Live Demo**: [Cloud Designer](https://socraticstatic.github.io/Cloud_Designer/)
            - **Live Demo**: [Cloud Designer](https://socraticstatic.github.io/Cloud_Designer/)
            
            ### How to Preview
            1. Download the preview artifact from the [Actions tab](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})
            2. Extract the files and serve them locally, or
            3. Wait for the main branch merge to see changes on the [live site](https://socraticstatic.github.io/Cloud_Designer/)
            
            ### Files Changed
            - Cloud Designer components updated
            - Templates enhanced with AT&T Core foundation
            - UI optimizations applied
            `;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });