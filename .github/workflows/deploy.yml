name: Deploy to GitHub Pages

on:
  push:
    branches: [main]  # Change this to your default branch if it's not 'main'
  pull_request:
    branches: [main]  # Run on PRs to main branch as well

# Cancel in-progress runs when new commits are pushed
concurrency:
  group: 'pages'
  cancel-in-progress: true

jobs:
  build-and-deploy:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18.x'
          cache: 'npm'
          cache-dependency-path: '**/package-lock.json'

      - name: Debug Node and npm versions
        run: |
          node --version
          npm --version

      - name: Install Dependencies
        run: |
          npm ci --prefer-offline --no-audit
          npm list --depth=0

      - name: Lint
        run: npm run lint --if-present
        continue-on-error: true

      - name: Run Tests
        run: npm test -- --passWithNoTests --watchAll=false
        continue-on-error: true

      - name: List files before build
        run: ls -la

      - name: Build
        run: |
          npm run build:gh-pages --if-present || npm run build
          ls -la dist/
        env:
          NODE_ENV: production
          VITE_APP_VERSION: ${{ github.sha }}

      - name: Upload Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'dist/.'

  deploy:
    needs: build-and-deploy
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v2
